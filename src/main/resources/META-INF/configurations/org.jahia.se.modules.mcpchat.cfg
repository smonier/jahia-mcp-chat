# default configuration - won't be overriden
# Jahia MCP Chat — OSGi configuration
#
# This file is deployed to: digital-factory-data/karaf/etc/org.jahia.se.modules.mcpchat.cfg
# Edit it there at runtime — changes take effect immediately without redeployment.
# The first line above prevents Jahia from overwriting operator edits on module redeploy.
# Never commit API keys to source control.
#
# ── MCP Server ────────────────────────────────────────────────────────────────
MCP_ENDPOINT=http://localhost:8080/modules/mcp
# JWT or personal API token used by the chat to authenticate against the MCP server.
# Users can override this with their own token in the chat settings panel.
# Leave blank if the MCP server allows unauthenticated access or uses session cookies.
MCP_JWT_TOKEN=

# ── LLM providers ─────────────────────────────────────────────────────────────
# Leave a key blank to hide that provider from the chat UI entirely.
ANTHROPIC_API_KEY=
OPENAI_API_KEY=
DEEPSEEK_API_KEY=

# ── Defaults ──────────────────────────────────────────────────────────────────
# Provider used when a user has no saved preference (must match a provider with a key above).
DEFAULT_PROVIDER=anthropic
# Model used when a user has no saved preference.
DEFAULT_MODEL=claude-sonnet-4-6
# Maximum output tokens per LLM response (users can override per-session).
MAX_TOKENS=4096

# ── System prompt appendix ────────────────────────────────────────────────────
# Additional instructions appended to the assistant system prompt.
# Use this to adapt the assistant's behaviour to your client's context:
# site conventions, content type naming, tone of voice, forbidden operations, etc.
# Supports plain text or Markdown.
#
# Example:
#   SYSTEM_PROMPT_APPENDIX=This Jahia instance hosts the ACME Corp intranet. \
#     Content types follow the naming convention acme:*. \
#     Never delete published content without explicit confirmation.
SYSTEM_PROMPT_APPENDIX=
